<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadeFromBrokens | Letter Series</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Poppins, sans-serif;
            background: #FFF8F3;
            color: #333;
        }

        .container {
            max-width: 1300px;
            margin: auto;
            padding: 40px;
        }

        /* PROFILE */

        .profile-section {
            text-align: center;
            margin-bottom: 60px;
        }

        .profile {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 50%;
            border: 8px solid #C94F7C;
            padding: 6px;
            background: white;
            box-shadow: 0 10px 30px rgba(201, 79, 124, .3);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #C94F7C;
            margin-top: 20px;
            font-size: 50px;
        }

        h2 {
            margin-top: 10px;
            color: #8B3A62;
        }

        .quote {
            margin-top: 15px;
            color: gray;
            font-style: italic;
        }

        .counter {
            width: 200px;
            margin: 25px auto;
            padding: 15px;
            background: #C94F7C;
            color: white;
            border-radius: 20px;
            font-weight: bold;
        }

        /* GALLERY */

        .gallery-title {
            text-align: center;
            color: #8B3A62;
            margin-bottom: 25px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-bottom: 60px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .08);
            transition: .3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 20px;
        }

        .card h3 {
            text-align: center;
            margin-top: 15px;
            color: #C94F7C;
        }

        /* LETTER GRID */

        .letters-title {
            text-align: center;
            color: #8B3A62;
            margin-bottom: 25px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
            justify-items: center;
        }

        .popup {
            position: fixed;
            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background: rgba(0, 0, 0, .8);

            display: none;

            justify-content: center;
            align-items: center;
            flex-direction: column;

            z-index: 1000;
        }

        .popup img {
            width: 350px;
            height: 350px;

            object-fit: cover;

            border-radius: 25px;

            border: 8px solid white;
        }

        .popup h2 {
            color: white;
            margin-top: 20px;
        }

        .close {
            position: absolute;

            top: 30px;
            right: 40px;

            color: white;

            font-size: 50px;

            cursor: pointer;
        }

        .letter {
            width: 75px;
            height: 75px;
            border: none;
            border-radius: 50%;
            background: #C8A2C8;
            color: #3D2248;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;
        }

        .letter:hover {
            transform: scale(1.1);
        }

        .current {
            background: #F4C542;
            color: #5B3A00;
            box-shadow: 0 0 20px rgba(244, 197, 66, .6);
        }

        .completed {
            background: #C94F7C;
            color: white;
            box-shadow: 0 0 20px rgba(201, 79, 124, .4);
        }

        footer {
            text-align: center;
            margin-top: 70px;
            color: gray;
        }

        @media(max-width:700px) {

            .grid {
                grid-template-columns: repeat(4, 1fr);
            }

            h1 {
                font-size: 38px;
            }

        }
    </style>
</head>

<body>

    <div class="container">

        <!-- PROFILE -->

        <div class="profile-section">

            <img src="profile.png" class="profile">

            <h1>MadeFromBrokens</h1>

            <h2>🌸 Letter Series 🪡✨</h2>

            <p class="quote">
                From broken threads to beautiful stories.
            </p>

            <div class="counter" id="counter">
                7 / 26 Letters Completed 🌹
            </div>

        </div>

        <!-- COMPLETED LETTERS -->

        <h2 class="gallery-title">
            Completed Letters 🌹
        </h2>

<div class="gallery">

    <div class="card" onclick="showImage('letterR.jpeg','Letter R 🌹')">
        <img src="letterR.jpeg">
        <h3>R 🌹</h3>
    </div>

    <div class="card" onclick="showImage('letterP.jpeg','Letter P 🌹')">
        <img src="letterP.jpeg">
        <h3>P 🌹</h3>
    </div>

    <div class="card" onclick="showImage('letterL.jpeg','Letter L 🌹')">
        <img src="letterL.jpeg">
        <h3>L 🌹</h3>
    </div>

    <div class="card" onclick="showImage('letterV.jpeg','Letter V 🌹')">
        <img src="letterV.jpeg">
        <h3>V 🌹</h3>
    </div>

    <div class="card" onclick="showImage('letterU.png','Letter U 🌹')">
        <img src="letterU.png">
        <h3>U 🌹</h3>
    </div>

    <div class="card" onclick="showImage('letterG.jpeg','Letter G 🌹')">
        <img src="letterG.jpeg">
        <h3>G 🌹</h3>
    </div>
    <div class="card" onclick="showImage('letterS.png','Letter S 🌹')">
        <img src="letterS.png">
        <h3>S 🌹</h3>
    </div>

</div>

            
               
            
            
            
           


        <div class="popup" id="popup">

            <span class="close">&times;</span>

            <img id="popup-img">

            <h2 id="popup-title"></h2>

        </div>

        <!-- LETTERS -->

        <h2 class="letters-title">
            Choose Next Letter 🪡
        </h2>

        <div class="grid" id="grid"></div>

        <footer>
            🪡 MadeFromBrokens • Letter Series ✨
        </footer>

    </div>

    <script>

        const completedLetters = ["L", "P", "R", "V", "U", "G","S"];

        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

        const grid = document.getElementById("grid");
        const popup = document.getElementById("popup");
        const popupImg =
            document.getElementById("popup-img");
        const popupTitle =
            document.getElementById("popup-title");

        function showImage(img, title) {

            popup.style.display = "flex";

            popupImg.src = img;

            popupTitle.innerText = title;
        }

        document.querySelector(".close")
            .addEventListener("click", () => {

                popup.style.display = "none";

            });

        alphabet.forEach(letter => {

            const btn = document.createElement("button");

            btn.innerText = letter;

            btn.classList.add("letter");

            if (completedLetters.includes(letter)) {
                btn.classList.add("completed");
            }

            function updateCounter() {
                document.getElementById("counter").innerHTML = completedLetters.length + " / 26 Letters Completed 🌹";
            }

            btn.onclick = () => {

                // Click once → Gold
                if (
                    !btn.classList.contains("completed")
                    &&
                    !btn.classList.contains("current")
                ) {

                    document
                        .querySelectorAll(".current")
                        .forEach(x => x.classList.remove("current"));

                    btn.classList.add("current");
                }

                // Click again → Completed
                else if (btn.classList.contains("current")) {

                    btn.classList.remove("current");
                    btn.classList.add("completed");
                    completedLetters.push(letter);
                    updateCounter();
                    btn.classList.add("completed");

                }

            }

            grid.appendChild(btn);

        });

    </script>

</body>

</html>
